<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}KPI Dashboard{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='vendor/bootstrap/bootstrap.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', path='css/app.css') }}">
</head>
<body>
  <aside class="sidebar">
    <div class="brand">KPI Ops</div>
    <nav>
      <a href="/">Dashboard</a>
      <a href="/upload">Upload</a>
      <a href="/kpis">KPI Explorer</a>
      <a href="/reports">Reports</a>
      <a href="/compare">Compare</a>
      <a href="/search">Search</a>
    </nav>
  </aside>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
  <script src="{{ url_for('static', path='vendor/chartjs/chart.umd.js') }}"></script>
  <script src="{{ url_for('static', path='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
